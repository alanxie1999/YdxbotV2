site_name: YdxbotV2 Wiki
site_description: YdxbotV2 使用文档与运维说明
site_url: https://ibarnard.github.io/YdxbotV2/
repo_url: https://github.com/ibarnard/YdxbotV2
repo_name: ibarnard/YdxbotV2
docs_dir: docs
site_dir: site
use_directory_urls: true

theme:
  name: material
  language: zh
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.highlight
    - search.suggest

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.highlight

nav:
  - 首页: index.md
  - 功能概览: features.md
  - 快速开始: quick-start.md
  - 配置说明:
      - 配置总览: config.md
      - 管理员控制台: config-admin-console.md
      - 通知渠道: config-notification-channels.md
      - AI 与模型: config-ai.md
      - betting 时序配置: config-betting.md
  - 命令参考: commands.md
  - 运行机制:
      - 投注与结算流程: runtime-betting-flow.md
      - 模型兜底与恢复: runtime-model-fallback.md
      - 统计口径说明: runtime-stats.md
  - 运维排障:
      - 更新与发布: ops-update-and-release.md
      - 常见故障排查: ops-troubleshooting.md
  - 更新日志: CHANGELOG.md
  - 发布规范: RELEASE_POLICY.md
